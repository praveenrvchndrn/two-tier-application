name: DevOps CI Pipeline

# Trigger the workflow on push or pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code onto the runner runner machine
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Setup Terraform CLI environment
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0

    # 3. Check syntax and formatting of Terraform files
    - name: Terraform Format Check
      run: terraform fmt -check

    - name: Terraform Init
      run: terraform init -backend=false

    - name: Terraform Validate
      run: terraform validate

    # 4. Try building the Dockerfile to ensure no syntax/compilation issues
    - name: Build Docker Image Test
      run: |
        docker build -t my-app-test:latest .
        echo "Docker image built successfully!"
