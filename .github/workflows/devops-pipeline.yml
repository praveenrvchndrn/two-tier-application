name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: "us-east-1" # 👈 Change to your target AWS region

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 🚀 NEW: Authenticate with AWS using your secure secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets::AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets::AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0

    - name: Terraform Init
      run: terraform init

    # 🚀 NEW: Run the targeted apply automatically on push!
    - name: Terraform Apply ECR
      run: |
        terraform apply -target=module.ec2.aws_ecr_repository.two-tier-app -auto-approve
